name: kreuzberg_cloud_sdk
description: >-
  Official Dart client SDK for the Kreuzberg Cloud document extraction API.
  Asynchronous extraction with webhook delivery, presigned uploads, and job polling.
version: 0.0.1
homepage: https://kreuzberg.dev
repository: https://github.com/kreuzberg-dev/kreuzberg-cloud-sdk
issue_tracker: https://github.com/kreuzberg-dev/kreuzberg-cloud-sdk/issues
documentation: https://github.com/kreuzberg-dev/kreuzberg-cloud-sdk/tree/main/packages/dart#readme

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.11.0
  retrofit: ^4.9.1

dev_dependencies:
  build_runner: ^2.10.4
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  lints: ^5.0.0
  retrofit_generator: ^10.2.0
  swagger_parser: ^1.43.1
  test: ^1.25.0

topics:
  - kreuzberg
  - document-extraction
  - ocr
  - api-client
