[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling>=1.27" ]

[project]
name = "kreuzberg-cloud"
version = "0.0.1"
description = "Official Python client for the Kreuzberg Cloud document-processing API."
readme = "README.md"
license = "MIT"
license-files = [ "../../LICENSE" ]
authors = [ { name = "Kreuzberg, Inc.", email = "contact@kreuzberg.dev" } ]
maintainers = [ { name = "Kreuzberg, Inc.", email = "contact@kreuzberg.dev" } ]
keywords = [ "kreuzberg", "cloud", "openapi", "client", "sdk", "document-extraction" ]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
requires-python = ">=3.10"
dependencies = [
  "attrs>=24.2",
  "httpx>=0.28.1",
  "python-dateutil>=2.9",
  "typing-extensions>=4.12 ; python_version < '3.11'",
]

[project.urls]
Homepage = "https://kreuzberg.cloud"
Documentation = "https://docs.kreuzberg.cloud"
Repository = "https://github.com/kreuzberg-dev/kreuzberg-cloud-sdk"
Issues = "https://github.com/kreuzberg-dev/kreuzberg-cloud-sdk/issues"

[tool.hatch.build]
packages = [ "src/kreuzberg_cloud" ]

[tool.hatch.build.targets.wheel]
packages = [ "src/kreuzberg_cloud" ]

[tool.hatch.build.targets.sdist]
include = [
  "src/kreuzberg_cloud/**",
  "README.md",
  "pyproject.toml",
]
