default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
exclude: ^(packages/python/src/kreuzberg_cloud/_generated/|packages/typescript/src/_generated/|packages/go/v1/generated\.go|spec/openapi\.yaml|node_modules/|dist/|coverage/|packages/dart/lib/src/_generated/)
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/xberg-io/pre-commit-hooks
  rev: v3.0.0
  hooks:
    # File safety
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-merge-conflict
    - id: check-added-large-files
    - id: detect-private-key
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-shebang-scripts-are-executable
    - id: mixed-line-ending
    - id: typos
      args: ["--force-exclude"]
    - id: check-json
    - id: check-yaml
      args:
      - --allow-multiple-documents
    - id: check-toml

    # GitHub Actions
    - id: actionlint
    - id: gh-actions-updater

    # Shell
    - id: shfmt
      args: ["-w", "-i", "2"]
    - id: shellcheck
      args:
      - -x

    # Markdown
    - id: rumdl-fmt
    - id: markdownlint-rumdl-strict
    - id: textlint

    # Python
    - id: pyproject-fmt
    - id: ruff
    - id: ruff-format
    - id: mypy
      files: ^packages/python/src/.*\.py$
    - id: pydocstyle

    # JS/TS
    - id: oxlint
    - id: oxfmt
    - id: tsc-typecheck
    - id: tsdoc-lint

    # Go
    - id: go-fmt
    - id: golangci-lint
    - id: govulncheck
    - id: godoc-lint

    # Dart
    - id: dart-format
    - id: dart-analyze
    - id: dart-doc-lint
