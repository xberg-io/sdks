default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
exclude: ^(packages/python/src/kreuzberg_cloud/_generated/|packages/typescript/src/_generated/|packages/go/v1/generated\.go|spec/openapi\.yaml|node_modules/|dist/|coverage/|packages/dart/lib/src/_generated/)
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/kreuzberg-dev/pre-commit-hooks
  rev: v1.2.1
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-merge-conflict
  - id: check-added-large-files
  - id: detect-private-key
  - id: check-json
  - id: check-yaml
    args:
    - --allow-multiple-documents
  - id: check-toml
  - id: check-case-conflict
  - id: pyproject-fmt
  - id: ruff
  - id: ruff-format
  - id: mypy
    files: ^packages/python/src/.*\.py$
  - id: oxlint
  - id: oxfmt
  - id: go-fmt
  - id: golangci-lint
  - id: govulncheck
  - id: shfmt
    args:
    - -w
    - -i
    - '2'
  - id: shellcheck
    args:
    - -x
  - id: dart-format
  - id: dart-analyze
  - id: rumdl-fmt
  - id: actionlint
  - id: gh-actions-updater
  - id: typos
    args:
    - --force-exclude
