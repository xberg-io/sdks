default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: ^(packages/python/src/kreuzberg_cloud/_generated/|packages/typescript/src/_generated/|packages/go/v1/generated\.go|spec/openapi\.yaml|node_modules/|dist/|coverage/|packages/dart/lib/src/_generated/)
repos:
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: check-toml
      - id: check-case-conflict
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.2
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.17
    hooks:
      - id: mypy
        files: ^packages/python/src/.*\.py$
      - id: oxlint
      - id: oxfmt
      - id: go-fmt
      - id: golangci-lint
      - id: govulncheck
      - id: shfmt
        args:
          - -w
          - -i
          - '2'
      - id: shellcheck
        args:
          - -x
      - id: dart-format
      - id: dart-analyze
      - id: rumdl-fmt
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.3
    hooks:
      - id: gh-actions-updater
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos
        args:
          - --force-exclude
