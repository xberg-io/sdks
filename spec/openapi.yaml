    - name: api_keys
      description: API key management
    - name: webhooks
      description: Webhook management
    - name: billing
      description: Billing and quota information
    - name: usage
      description: Usage statistics
    - name: analytics
      description: Rich analytics data
    - name: sandbox
      description: Sandbox extraction playground
