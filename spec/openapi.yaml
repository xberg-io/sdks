openapi: 3.1.0
info:
    title: Kreuzberg Backend API
    description: Backend API for Kreuzberg Cloud - document processing SaaS platform
    contact:
        name: Kreuzberg Cloud
        url: https://kreuzberg.cloud
    license:
        name: BUSL-1.1
        identifier: BUSL-1.1
    version: 0.1.0
paths:
    /auth/account:
        delete:
            tags:
                - auth
            summary: Delete the authenticated user's account and all associated data
            description: "Soft-deletes all projects owned by the user, revokes their API
                keys,

                soft-deletes their webhooks, and removes all project memberships."
            operationId: delete_account
            responses:
                "204":
                    description: Account deleted successfully
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /auth/login:
        post:
            tags:
                - auth
            summary: Authenticate with an OIDC ID token and receive a backend JWT
            operationId: login
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/LoginRequest"
                required: true
            responses:
                "200":
                    description: Successful login
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/LoginResponse"
                "401":
                    description: Invalid OIDC ID token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Authentication is disabled
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "503":
                    description: Identity provider service unavailable
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
    /healthz:
        get:
            tags:
                - health
            summary: Liveness probe - returns 200 if the process is running
            operationId: healthz
            responses:
                "200":
                    description: Service is alive
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthResponse"
                            example:
                                status: ok
    /readyz:
        get:
            tags:
                - health
            summary: Readiness probe - returns 200 if the service can handle traffic
            operationId: readyz
            responses:
                "200":
                    description: Service is ready
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ReadinessResponse"
                            example:
                                checks:
                                    database: ok
                                status: ready
                "503":
                    description: Service is not ready
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ReadinessResponse"
    /v1/invitations/accept:
        post:
            tags:
                - members
            summary: Accept an invitation using a token
            operationId: accept_invitation
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AcceptInvitationRequest"
                required: true
            responses:
                "200":
                    description: Invitation accepted, membership created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MemberResponse"
                "400":
                    description: Invalid or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: User is already a member
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects:
        get:
            tags:
                - projects
            summary: List all projects for the authenticated user
            operationId: list_projects
            parameters:
                - name: limit
                  in: query
                  description: Number of items to return (default 100, max 1000)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 100
                - name: offset
                  in: query
                  description: Number of items to skip (default 0)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 0
            responses:
                "200":
                    description: List of projects
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PaginatedResponse_ProjectResponse"
                "400":
                    description: Invalid pagination parameters
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
        post:
            tags:
                - projects
            summary: Create a new project
            operationId: create_project
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateProjectRequest"
                required: true
            responses:
                "201":
                    description: Project created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ProjectResponse"
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: Project slug already exists
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}:
        get:
            tags:
                - projects
            summary: Get project details by ID
            operationId: get_project
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Project details
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ProjectResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not a member
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
        delete:
            tags:
                - projects
            summary: Delete a project
            operationId: delete_project
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Project deleted
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
        patch:
            tags:
                - projects
            summary: Update project details
            operationId: update_project
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpdateProjectRequest"
                required: true
            responses:
                "200":
                    description: Project updated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ProjectResponse"
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/analytics:
        get:
            tags:
                - analytics
            summary: Get analytics data for a project within a date range
            description: "Returns daily usage metrics and processing time percentiles aggregated

                from extraction jobs. Includes job counts, pages/tables/images extracted,

                file type breakdowns, and p50/p95/p99 processing latencies."
            operationId: get_analytics
            parameters:
                - name: start_date
                  in: query
                  description: Start date (ISO 8601 format, e.g., "2025-01-01")
                  required: true
                  schema:
                      type: string
                  example: "2025-01-01"
                - name: end_date
                  in: query
                  description: End date (ISO 8601 format, e.g., "2025-01-31")
                  required: true
                  schema:
                      type: string
                  example: "2025-01-31"
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Analytics data
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AnalyticsResponse"
                "400":
                    description: Invalid date format or range
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/api-keys:
        get:
            tags:
                - api_keys
            summary: List all API keys for a project
            operationId: list_api_keys
            parameters:
                - name: limit
                  in: query
                  description: Number of items to return (default 100, max 1000)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 100
                - name: offset
                  in: query
                  description: Number of items to skip (default 0)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 0
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: List of API keys
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/ApiKeyResponse"
                "400":
                    description: Invalid pagination parameters
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not a member
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
        post:
            tags:
                - api_keys
            summary: Create a new API key for a project
            operationId: create_api_key
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateApiKeyRequest"
                required: true
            responses:
                "201":
                    description: API key created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CreateApiKeyResponse"
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/api-keys/{key_id}:
        delete:
            tags:
                - api_keys
            summary: Revoke an API key
            operationId: revoke_api_key
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: key_id
                  in: path
                  description: API Key ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: API key revoked
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project or API key not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/api-keys/{key_id}/regenerate:
        post:
            tags:
                - api_keys
            summary: Regenerate an API key
            operationId: regenerate_api_key
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: key_id
                  in: path
                  description: API Key ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: API key regenerated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CreateApiKeyResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project or API key not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/billing:
        get:
            tags:
                - billing
            summary: Get billing and quota information for a project
            description: "Returns the project's plan limits, current usage for the billing
                period,

                and remaining quota. Useful for rendering usage progress bars on the

                frontend dashboard."
            operationId: get_billing
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Billing and quota information
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BillingResponse"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/billing/checkout:
        post:
            tags:
                - billing
            summary: Create a Stripe Checkout Session for a project
            description: "Creates (or reuses) a Stripe customer for the project and opens
                a

                Checkout Session in subscription mode so the user can add a payment

                method and subscribe to the standard plan."
            operationId: create_checkout
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Checkout Session URL
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CheckoutResponse"
                "400":
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: Subscription already active
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/billing/portal:
        post:
            tags:
                - billing
            summary: Create a Stripe Customer Portal Session for a project
            description: "Opens a Customer Portal session so the user can manage their subscription,

                update payment methods, or view billing history."
            operationId: create_portal
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Customer Portal URL
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PortalResponse"
                "400":
                    description: No billing account
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/invitations:
        get:
            tags:
                - members
            summary: List pending invitations for a project
            operationId: list_invitations
            parameters:
                - name: limit
                  in: query
                  description: Number of items to return (default 100, max 1000)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 100
                - name: offset
                  in: query
                  description: Number of items to skip (default 0)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 0
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: List of pending invitations
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PaginatedResponse_InvitationResponse"
                "400":
                    description: Invalid pagination parameters
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not a member
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
        post:
            tags:
                - members
            summary: Create a project invitation (sends token for email delivery by frontend)
            operationId: invite_user
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateInvitationRequest"
                required: true
            responses:
                "201":
                    description: Invitation created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CreateInvitationResponse"
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Project not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: Pending invitation already exists for this email, or user is already an active member
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/invitations/{inv_id}:
        delete:
            tags:
                - members
            summary: Revoke a pending invitation
            operationId: revoke_invitation
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: inv_id
                  in: path
                  description: Invitation ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Invitation revoked
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not owner
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Invitation not found or not pending
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/leave:
        post:
            tags:
                - members
            summary: "Self-service: caller leaves a project they belong to"
            operationId: leave_project
            parameters:
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Successfully left project
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - caller is not a member of this project
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: Cannot leave - caller is sole owner with other members; transfer ownership first
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
            security:
                - bearer_auth: []
    /v1/projects/{id}/members:
        get:
            tags:
                - members
            summary: List all members of a project
            operationId: list_members
            parameters:
                - name: limit
                  in: query
                  description: Number of items to return (default 100, max 1000)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 100
                - name: offset
                  in: query
                  description: Number of items to skip (default 0)
                  required: false
                  schema:
                      type: integer
                      format: int32
                  example: 0
                - name: id
                  in: path
                  description: Project ID
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: List of members
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PaginatedResponse_MemberResponse"
                "400":
                    description: Invalid pagination parameters
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Unauthorized - no auth token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "403":
                    description: Forbidden - user not a member
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
