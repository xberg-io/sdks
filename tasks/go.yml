version: "3"

# Go client tasks (module at packages/go/v1).

vars:
  PKG_DIR: packages/go/v1

tasks:
  generate:
    desc: "Regenerate Go client from spec/openapi.yaml (BLOCKED: oapi-codegen 3.1 support — see Workstream E-go)"
    cmds:
      # STATUS: Go codegen is blocked on upstream oapi-codegen support for
      # OpenAPI 3.1 (oapi-codegen/oapi-codegen#373). The xberg-enterprise
      # public API spec is 3.1 (utoipa default) and uses 3.1 nullable
      # unions inside oneOfs (`oneOf: [{type: null}, $ref]`) which the
      # downconverter strips lossy-ly and oapi-codegen v2.7 still chokes
      # on. Until 3.1 lands upstream, the Go SDK ships a hand-written
      # interim client (Workstream E-go) instead of generated bindings.
      #
      # When unblocking, replace this block with the previous downconvert+
      # codegen flow:
      #   npx --yes @apiture/openapi-down-convert -i spec/openapi.yaml \
      #       -o /tmp/xberg-enterprise-openapi-3.0.yaml
      #   cd {{.PKG_DIR}} && go tool oapi-codegen -config oapi-codegen.yaml \
      #       /tmp/xberg-enterprise-openapi-3.0.yaml
      #   cd {{.PKG_DIR}} && go mod tidy
      - echo "Go codegen is blocked on oapi-codegen 3.1 support (Workstream E-go); skipping."

  install:
    desc: "Download Go module dependencies"
    dir: "{{.PKG_DIR}}"
    cmds:
      - go mod download
      - go mod tidy

  build:
    desc: "Compile Go module (verifies build, no artifact)"
    dir: "{{.PKG_DIR}}"
    cmds:
      - go build ./...

  test:
    desc: "Run Go test suite"
    dir: "{{.PKG_DIR}}"
    cmds:
      - go test -race -v ./...

  test:cov:
    desc: "Run Go tests with coverage"
    dir: "{{.PKG_DIR}}"
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  lint:
    desc: "Lint Go sources (golangci-lint + govulncheck)"
    dir: "{{.PKG_DIR}}"
    cmds:
      - golangci-lint run ./...
      - govulncheck ./...

  format:
    desc: "Format Go sources (gofmt)"
    dir: "{{.PKG_DIR}}"
    cmds:
      - go fmt ./...
