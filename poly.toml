# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

# discovery-exclude (pending polylint feature): direct `poly lint .`/`poly fmt .` does not yet honor these; they apply
# to the hook builtins below. Globs:
#   (packages/python/src/kreuzberg_cloud/_generated/**
#   **/*.lock
#   **/Cargo.lock
#   **/go.sum
#   **/package-lock.json
#   **/pnpm-lock.yaml
#   **/uv.lock
#   coverage/**
#   dist/**
#   node_modules/**
#   packages/dart/lib/src/_generated/)/**
#   packages/go/v1/generated.go/**
#   packages/typescript/src/_generated/**
#   spec/openapi.yaml/**

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[lint.python.ruff]
# ruff: only select/ignore are portable to poly (per-file-ignores dropped)
select = [
    "ALL",
]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]

[lint.markdown.rumdl]
disable = [
    "MD013",
    "MD033",
    "MD041",
]

[fmt.markdown.rumdl]
disable = [
    "MD013",
    "MD033",
    "MD041",
]

# oxc: only select/ignore are portable; oxlint categories/rules/overrides/plugins are NOT expressible in poly.
# Original .oxlintrc.json retained for reference but not read by poly.
[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "(packages/python/src/kreuzberg_cloud/_generated/**",
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/)/**",
    "packages/go/v1/generated.go/**",
    "packages/typescript/src/_generated/**",
    "spec/openapi.yaml/**",
] }
polyfmt = { exclude = [
    "(packages/python/src/kreuzberg_cloud/_generated/**",
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/)/**",
    "packages/go/v1/generated.go/**",
    "packages/typescript/src/_generated/**",
    "spec/openapi.yaml/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "(packages/python/src/kreuzberg_cloud/_generated/**",
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/)/**",
    "packages/go/v1/generated.go/**",
    "packages/typescript/src/_generated/**",
    "spec/openapi.yaml/**",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.actionlint]
enabled = true

[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.pydocstyle]
enabled = true

[tools.golangci-lint]
enabled = true
# NOTE: env + per-module cwd (e.g. packages/go) not yet supported by [tools.*].

# --- lightweight inline script hooks (no toolchain) ---
[hooks.pre-commit.scripts.gh_actions_updater]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-gh-actions-updater"

