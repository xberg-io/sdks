# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/**",
    "packages/go/v1/generated.go/**",
    "packages/python/src/kreuzberg_cloud/_generated/**",
    "packages/typescript/src/_generated/**",
    "spec/**",
    "spec/openapi.yaml/**",
]

[per-file-ignores]
"**/tests/**/*.*" = [
    "A005",
    "ANN",
    "ARG001",
    "ARG002",
    "ASYNC230",
    "BLE001",
    "D",
    "N806",
    "N815",
    "PGH003",
    "PLC",
    "PLR0915",
    "PLR2004",
    "PT006",
    "PT007",
    "PT013",
    "PT017",
    "PT031",
    "RUF012",
    "S",
    "SIM117",
    "SLF001",
]

[lint.python.ruff]
pydocstyle_convention = "google"
mccabe_max_complexity = 15
pylint_max_args = 10
pylint_max_branches = 15
pylint_max_returns = 10
known_first_party = ["kreuzberg_cloud"]
select = ["ALL"]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]

[lint.markdown.rumdl]
disable = ["MD013", "MD033", "MD041"]

[fmt.markdown.rumdl]
disable = ["MD013", "MD033", "MD041"]

# oxc: only select/ignore are portable; oxlint categories/rules/overrides/plugins are NOT expressible in poly.
# Original .oxlintrc.json retained for reference but not read by poly.
[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/**",
    "packages/go/v1/generated.go/**",
    "packages/python/src/kreuzberg_cloud/_generated/**",
    "packages/typescript/src/_generated/**",
    "spec/**",
    "spec/openapi.yaml/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/**",
    "packages/go/v1/generated.go/**",
    "packages/python/src/kreuzberg_cloud/_generated/**",
    "packages/typescript/src/_generated/**",
    "spec/**",
    "spec/openapi.yaml/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "coverage/**",
    "dist/**",
    "node_modules/**",
    "packages/dart/lib/src/_generated/**",
    "packages/go/v1/generated.go/**",
    "packages/python/src/kreuzberg_cloud/_generated/**",
    "packages/typescript/src/_generated/**",
    "spec/**",
    "spec/openapi.yaml/**",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.actionlint]
enabled = true

[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.pyrefly]
enabled = true
files = "packages/python/src/**/*.py"

[tools.pydocstyle]
enabled = true

[tools.golangci-lint]
enabled = true
# NOTE: env + per-module cwd (e.g. packages/go) not yet supported by [tools.*].

# --- lightweight inline script hooks (no toolchain) ---
[hooks.pre-commit.scripts.gh_actions_updater]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-gh-actions-updater"

