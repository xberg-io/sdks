name: Publish pub.dev

# pub.dev OIDC trusted publishing rejects tokens from `release` events and
# branch refs. This workflow publishes from version tags, which produce an
# accepted token matching the configured `v{{version}}` tag pattern.
#
# One-time setup: on pub.dev -> package -> Admin -> Automated publishing,
# set the workflow path to `.github/workflows/publish-pubdev.yaml`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-pub:
    name: Publish pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: xberg-io/actions/publish-pub@v1
        with:
          package-dir: packages/dart
