name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (vX.Y.Z) — required for workflow_dispatch"
        required: false
      dry_run:
        description: "Build everything, skip publishes"
        type: boolean
        default: false
      force_republish:
        description: "Republish even if version exists in registry"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
      npm_tag: ${{ steps.metadata.outputs.npm_tag }}
      dry_run: ${{ steps.metadata.outputs.dry_run }}
      force_republish: ${{ steps.metadata.outputs.force_republish }}
      release_python: ${{ steps.metadata.outputs.release_python }}
      release_node: ${{ steps.metadata.outputs.release_node }}
      release_go: ${{ steps.metadata.outputs.release_go }}
    steps:
      - name: Extract release metadata
        id: metadata
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_FORCE_REPUBLISH: ${{ inputs.force_republish }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.+-]+)?$ ]]; then
            echo "tag '$tag' does not match v<semver>" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "$version" =~ -(rc|alpha|beta|pre|dev) ]]; then
            npm_tag="next"
          else
            npm_tag="latest"
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "npm_tag=$npm_tag"
            echo "dry_run=${INPUT_DRY_RUN:-false}"
            echo "force_republish=${INPUT_FORCE_REPUBLISH:-false}"
            echo "release_python=true"
            echo "release_node=true"
            echo "release_go=true"
          } >> "$GITHUB_OUTPUT"
          echo "tag=$tag version=$version npm_tag=$npm_tag dry_run=${INPUT_DRY_RUN:-false} force_republish=${INPUT_FORCE_REPUBLISH:-false}"

  validate-versions:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify all manifests match the tag
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          file_version=$(cat VERSION)
          py_version=$(grep -E '^version = ' packages/python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          ts_version=$(python3 -c 'import json; print(json.load(open("packages/typescript/package.json"))["version"])')
          go_version=$(grep -E '^const Version = ' packages/go/v1/version.go | sed 's/.*"\(.*\)".*/\1/')
          for v in "$file_version" "$py_version" "$ts_version" "$go_version"; do
            if [ "$v" != "$VERSION" ]; then
              echo "version mismatch: tag=$VERSION file=$file_version py=$py_version ts=$ts_version go=$go_version" >&2
              exit 1
            fi
          done
          echo "all manifests at $VERSION"

  check-pypi:
    needs: prepare
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Probe PyPI
        id: check
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/kreuzberg-cloud/${VERSION}/json")
          if [ "$status" = "200" ]; then exists=true; else exists=false; fi
          echo "kreuzberg-cloud ${VERSION} on PyPI: status=$status exists=$exists"
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

  check-npm:
    needs: prepare
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Probe npm
        id: check
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://registry.npmjs.org/@kreuzberg%2Fcloud/${VERSION}")
          if [ "$status" = "200" ]; then exists=true; else exists=false; fi
          echo "@kreuzberg/cloud ${VERSION} on npm: status=$status exists=$exists"
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

  build-python:
    needs: [prepare, validate-versions]
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.10"
      - uses: kreuzberg-dev/actions/install-task@v1
      - name: Generate client
        run: task python:generate
      - name: Build wheel + sdist
        run: task python:build
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/
          retention-days: 7

  build-typescript:
    needs: [prepare, validate-versions]
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
      - uses: kreuzberg-dev/actions/install-task@v1
      - name: Generate client
        run: task typescript:generate
      - name: Build
        run: task typescript:build
      - name: Pack
        run: cd packages/typescript && pnpm pack --pack-destination ${{ runner.temp }}
      - uses: actions/upload-artifact@v7
        with:
          name: typescript-dist
          path: ${{ runner.temp }}/*.tgz
          retention-days: 7

  publish-pypi:
    needs: [prepare, validate-versions, check-pypi, build-python]
    if: |
      needs.prepare.outputs.release_python == 'true' &&
      (needs.check-pypi.outputs.exists != 'true' ||
       needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kreuzberg-cloud
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist/
      - name: Publish to PyPI (OIDC trusted publisher)
        if: needs.prepare.outputs.dry_run != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
      - name: Dry-run summary
        if: needs.prepare.outputs.dry_run == 'true'
        run: ls -la dist/

  publish-npm:
    needs: [prepare, validate-versions, check-npm, build-typescript]
    if: |
      needs.prepare.outputs.release_node == 'true' &&
      (needs.check-npm.outputs.exists != 'true' ||
       needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v7
        with:
          name: typescript-dist
          path: dist-pack/
      - name: Publish to npm (with provenance)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
          DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist-pack/*.tgz)
          if [ ${#tarballs[@]} -eq 0 ]; then
            echo "no .tgz found in dist-pack/" >&2
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            # npm publish needs a './' or absolute prefix on a tarball path,
            # otherwise it interprets bare 'dir/file.tgz' as a git/pkg ref.
            abs="$(realpath "$tgz")"
            echo "publishing $abs tag=${NPM_TAG:-latest} dry=${DRY_RUN}"
            if [ "${DRY_RUN}" = "true" ]; then
              npm publish --dry-run --access public --provenance --tag "${NPM_TAG:-latest}" "$abs"
            else
              npm publish --access public --provenance --tag "${NPM_TAG:-latest}" "$abs"
            fi
          done

  tag-go:
    needs: [prepare, validate-versions]
    if: needs.prepare.outputs.release_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: kreuzberg-dev/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          go-module-path: packages/go/v1
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  github-release:
    needs: [prepare, publish-pypi, publish-npm, tag-go]
    if: |
      always() &&
      !cancelled() &&
      needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          generate-notes: "true"
