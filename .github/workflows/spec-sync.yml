name: spec-sync

on:
  # Weekly sweep on Monday 06:00 UTC. Source of truth is
  # xberg-enterprise/services/api/spec/openapi.json — the canonical OpenAPI
  # spec emitted by the public extraction API (utoipa-generated).
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: refresh vendored OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: kreuzberg-dev
          repositories: |
            sdks
            xberg-enterprise

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Checkout sibling xberg-enterprise
        uses: actions/checkout@v6
        with:
          repository: xberg-io/xberg-enterprise
          path: _xberg-enterprise
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Convert JSON spec to YAML
        run: |
          yq -P -oy '.' \
            _xberg-enterprise/services/api/spec/openapi.json \
            > spec/openapi.yaml
      - name: Detect drift
        id: diff
        run: |
          if git diff --quiet -- spec/openapi.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(spec): sync openapi.yaml from xberg-enterprise"
          title: "chore(spec): sync openapi.yaml from xberg-enterprise"
          body: |
            Automated sync of `spec/openapi.yaml` from
            `xberg-io/xberg-enterprise@main:services/api/spec/openapi.json`
            (the canonical public extraction API spec).

            Run `task generate` and review per-language diffs before merging.
          branch: chore/spec-sync
          delete-branch: true
          add-paths: spec/openapi.yaml
